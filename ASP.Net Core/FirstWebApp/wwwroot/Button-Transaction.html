<!doctype html>
<html>
  <head>
    <title>CSS Transition Example</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 100px;
      }

      button {
        background-color: blue;
        color: white;
        padding: 15px 30px;
        border: none;
        font-size: 18px;
        border-radius: 5px;
        cursor: pointer;

        /* Smooth effect */
        transition: background-color 1s ease;
      }

      button:hover {
        background-color: red;
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <h2>Transition Example</h2>

    <button>Hover Me</button>
  </body>
</html>

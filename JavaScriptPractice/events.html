<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>========== addEventListener Demo =========</h2>

    <!-- 1️ Click Event -->
    <button id="clickBtn">Click Me</button>

    <!-- 2️ Double Click Event -->
    <button id="dblClickBtn">Double Click Me</button>

    <!-- 3️ Mouse Events -->
    <div id="box">Hover Over Me</div>

    <!-- 4️ Keyboard Event -->
    <br /><br />
    <input type="text" id="keyInput" placeholder="Type Something" />

    <!-- 5️ Input Event -->
    <br /><br />
    <input type="text" id="liveInput" placeholder="Live Typing" />

    <p id="liveOutput"></p>

    <!-- 6️ Form Submit -->
    <form id="myForm">
      <input type="text" placeholder="Enter Name" required />
      <button type="submit">Submit</button>
    </form>

    <!-- 7️ Event Bubbling -->
    <h3>Event Bubbling Example</h3>
    <div id="parent">
      Parent Div
      <div id="child">Child Div</div>
    </div>
    <script>
      document
        .getElementById("clickBtn")
        .addEventListener("click", function () {
          console.log("Button Clicked!");
        });

      document
        .getElementById("dblClickBtn")
        .addEventListener("dblclick", function () {
          console.log("Button Double Clicked!");
        });
      document.getElementById("box").addEventListener("mouseover", function () {
        document.getElementById("box").style.backgroundColor = "yellow";
        console.log("Mouse Over Box!");
      });
      let box = document.getElementById("box");
      box.addEventListener("mouseout", function () {
        box.style.backgroundColor = "lightblue";
        console.log("Mouse Out of Box!");
      });

      let key = document.getElementById("keyInput");
      key.addEventListener("keydown", function (event) {
        console.log("Key Pressed:", event.key);
      });

      document
        .getElementById("liveInput")
        .addEventListener("input", function (event) {
          document.getElementById("liveOutput").textContent =
            "You typed: " + event.target.value;
        });

      document
        .getElementById("submitBtn")
        .addEventListener("click", function (event) {
          event.preventDefault();
          console.log("Form Submitted!");
        });

      document.getElementById("parent").addEventListener("click", function () {
        console.log("Parent Div Clicked!");
      });

      document
        .getElementById("child")
        .addEventListener("click", function (event) {
          event.stopPropagation();
          console.log("Child Div Clicked!");
        });
    </script>
  </body>
</html>
